name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./...

      - run: go build -o key-env ./cmd/keyenv

  ci-integration-test:
    runs-on: ubuntu-latest
    needs: ci-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install KeePassXC
        run: sudo apt-get update && sudo apt-get install -y keepassxc

      - run: make integrations
